name: CI

on:
    push:
    pull_request:

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                php: ['8.4']

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
              with:
                  persist-credentials: false

            - name: Set up PHP version ${{ matrix.php }}
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
              with:
                  php-version: ${{ matrix.php }}
                  tools: composer:v2

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '22'

            - id: install
              name: Install dependencies
              run: |
                  composer validate
                  composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts
                  npm install

            - name: Lint
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  php vendor/bin/phplint --configuration .build/.phplint.yml

            - name: CGL
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  PHP_CS_FIXER_IGNORE_ENV=1 php vendor/bin/php-cs-fixer fix --config .build/.php-cs-fixer.dist.php --diff --verbose --cache-file .build/.php-cs-fixer.cache

            - name: PHPStan
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  php vendor/bin/phpstan analyze --configuration .build/phpstan.neon --memory-limit=-1 --error-format=github

            - name: Rector
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  php vendor/bin/rector process --config .build/rector.php

            - name: PHPUnit
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: |
                  php vendor/bin/phpunit --configuration .build/phpunit.xml

            - name: Copy-Paste Detection
              if: ${{ always() && steps.install.conclusion == 'success' }}
              run: composer ci:test:php:cpd
